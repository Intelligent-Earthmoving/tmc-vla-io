[tool.pixi.workspace]
name = "tmc-vla-io"
authors = ["Isaac Blankenau <isaac.blankenau@gmail.com>"]
channels = ["conda-forge"]
platforms = [
    "linux-64",
    "linux-aarch64",
    "osx-arm64",
    "win-64",
]

[tool.pixi.dependencies]
nodejs = ">=25.6.0,<25.7"

[tool.pixi.tasks]
host_webpage = { cmd = "npm install && npm run dev", cwd = "docs" }
